<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Removedor de Fundo Grátis</title>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            padding: 40px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 700px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        canvas {
            max-width: 100%;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            margin-top: 20px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Removedor de Fundo (Pessoas)</h1>
        <p style="font-size: 14px; color: #666;">Nota: Esta versão gratuita só reconhece e remove o fundo de
            <strong>fotos com pessoas</strong>.
        </p>

        <input type="file" id="upload" accept="image/*">

        <br>

        <button id="removeBtn" onclick="removeBackground()" disabled>Carregando modelo AI...</button>

        <br>
        <p id="status" style="color: #4CAF50; display: none;">Pronto para remover!</p>

        <br>

        <canvas id="canvas"></canvas>

    </div>

    <script>

        let img = new Image()
        let net = null;

        // Load the model as soon as the page loads
        async function initModel() {
            try {
                net = await bodyPix.load();
                document.getElementById("removeBtn").disabled = false;
                document.getElementById("removeBtn").innerText = "Remover Fundo";
                document.getElementById("status").style.display = "block";
            } catch (err) {
                document.getElementById("removeBtn").innerText = "Erro ao carregar IA";
                console.error("Erro ao carregar o BodyPix:", err);
            }
        }

        initModel();

        document.getElementById("upload").addEventListener("change", function (e) {
            const file = e.target.files[0]
            if (file) {
                img.src = URL.createObjectURL(file)
                // Clear the canvas when a new image is loaded
                const canvas = document.getElementById("canvas")
                const ctx = canvas.getContext("2d")
                ctx.clearRect(0, 0, canvas.width, canvas.height)
                document.getElementById("status").innerText = "Imagem carregada. Clique para remover o fundo!";
            }
        })

        async function removeBackground() {
            if (!img.src) {
                alert("Por favor, selecione uma imagem primeiro.");
                return;
            }

            if (!net) {
                alert("Aguarde a Inteligência Artificial terminar de carregar.");
                return;
            }

            document.getElementById("status").innerText = "Removendo fundo... isso pode levar alguns segundos.";
            document.getElementById("removeBtn").disabled = true;

            try {
                const segmentation = await net.segmentPerson(img)

                const canvas = document.getElementById("canvas")
                const ctx = canvas.getContext("2d")

                canvas.width = img.width
                canvas.height = img.height

                ctx.drawImage(img, 0, 0)

                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height)

                for (let i = 0; i < segmentation.data.length; i++) {
                    if (segmentation.data[i] === 0) {
                        // Make non-person pixels transparent
                        imageData.data[i * 4 + 3] = 0
                    }
                }

                ctx.putImageData(imageData, 0, 0)
                document.getElementById("status").innerText = "Fundo removido com sucesso!";

            } catch (err) {
                console.error(err);
                document.getElementById("status").innerText = "Erro ao processar imagem. Tente novamente.";
            } finally {
                document.getElementById("removeBtn").disabled = false;
            }

        }

    </script>

</body>

</html>
