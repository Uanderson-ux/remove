<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Removedor de Fundo de Imagens</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            text-align: center;
            padding: 40px;
        }

        .container {
            max-width: 600px;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #333;
        }

        input[type=file] {
            margin: 20px 0;
        }

        button {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        img {
            max-width: 100%;
            margin-top: 20px;
            border-radius: 6px;
        }

        .download {
            margin-top: 15px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="container">

        <h1>Removedor de Fundo de Imagens</h1>

        <p>Envie uma imagem e remova o fundo automaticamente.</p>

        <input type="file" id="imageInput">

        <br>

        <button onclick="removeBackground()">Remover Fundo</button>

        <div id="result"></div>

        <a id="downloadLink" class="download" download="imagem-sem-fundo.png">
            <button>Baixar imagem</button>
        </a>

    </div>

    <script>

        async function removeBackground() {

            const fileInput = document.getElementById("imageInput")

            if (fileInput.files.length === 0) {
                alert("Escolha uma imagem")
                return
            }

            const file = fileInput.files[0]

            const formData = new FormData()
            formData.append("image_file", file)

            const apiKey = "dfwtGSjBL13LNXXS2cEJzqgA"

            const response = await fetch("https://api.remove.bg/v1.0/removebg", {
                method: "POST",
                headers: {
                    "X-Api-Key": apiKey
                },
                body: formData
            })

            if (!response.ok) {
                alert("Erro ao remover fundo")
                return
            }

            const blob = await response.blob()
            const url = URL.createObjectURL(blob)

            document.getElementById("result").innerHTML = `<img src="${url}">`

            const download = document.getElementById("downloadLink")
            download.href = url
            download.style.display = "inline-block"

        }

    </script>

</body>

</html>
